<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mami Karen 💖</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- LOADER -->
  <div id="loader">

    <div class="loader-content">
      <div class="heart">💖</div>

      <h1>Feliz Día de las Madres...</h1>

      <p>
        Preparando una sorpresa especial ✨
      </p>
    </div>

  </div>
  <div class="floating-bg"></div>

  <audio id="bgMusic" loop>
    <source src="assets/audio/musica.mp3" type="audio/mp3" />
  </audio>

  <main class="app">

    <div class="progress-bar">
  <div id="progressFill"></div>
</div>

    <!-- PANTALLA 1 -->
    <section class="screen active">
      <div class="content">
        <p class="tag">Eres muy especial en nuestras vidas ✨</p>
        <h1>Mi Super Mamá 💖</h1>
        <p class="message type-text" data-text="Hoy queremos regalarte un pequeño viaje por nuestros momentos más bonitos, junto a nuestra hija."></p>

        <button class="btn" onclick="startExperience()">
          Abrir sorpresa 🌸
        </button>
      </div>
    </section>

    <!-- PANTALLA 2 -->
    <section class="screen">
      <div class="content">
        <h2>Gracias por tanto amor 💌</h2>
        <p class="message type-text"
  data-text="Mi súper mamá 💖, cuando veas esto quiero que se dibuje una sonrisa en tu hermosa carita jejeje. Aunque mi letra no sea la más bonita, mi mente y mis dedos quisieron dedicarte este pequeño detalle hecho con muchísimo cariño, así como el cariño tan grande que le tengo a la programación. Sabes hermosa, cada día admiro y valoro más la increíble madre que eres para Sofía. Aunque ella todavía no entienda mucho de estas cosas, su amor puro cada vez que dice 'Mami' lo dice absolutamente todo. Gracias por ser tan amorosa, por tener una paciencia que a veces me deja con la boca abierta jejeje. Quiero que sigas siendo esa mujer ejemplar, trabajadora y profesional, porque deseo que Sofía crezca viendo que una mujer puede lograr todo lo que se proponga, sin importar nada. Gracias por ser la mujer que me permitió compartir momentos tan hermosos y construir esta familia contigo. Sé que aún nos faltan muchas cosas por vivir y mejorar, pero quiero seguir esforzándome cada día por nuestro hogar, porque tú haces que mi lugar seguro sea nuestro hogar. Te amo muchísimo, más de lo que imaginas. Pero hoy no se trata solo de mí o de ti, sino del hermoso significado de ser madre… y créeme, lo estás haciendo increíblemente bien. Gracias por hacer tan feliz a Sofía, por cuidar de nuestro hogar y por hacerlo cada día más grande, más fuerte y más lleno de amor 🌸✨">
</p>

        <button class="btn" onclick="nextScreen()">
          Ver recuerdos 📸
        </button>
      </div>
    </section>

    <!-- PANTALLA 3 -->
    <section class="screen">
      <div class="content wide">
        <h2>Nuestros recuerdos favoritos 📸</h2>

        <div class="carousel">
          <img id="carouselImage" src="assets/fotos/foto1.jpg" alt="Recuerdo especial" />
        </div>

        <div class="carousel-controls">
          <button class="small-btn" onclick="prevPhoto()">←</button>
          <span id="photoCounter">1 / 18</span>
          <button class="small-btn" onclick="nextPhoto()">→</button>
        </div>

        <button class="btn" onclick="nextScreen()">
          Ver video especial 🎥
        </button>
      </div>
    </section>

    <!-- PANTALLA 4 -->
    <section class="screen">
      <div class="content wide">
        <h2>Un videito especial 🎥</h2>

        <div class="video-box">
          <video id="specialVideo" controls>
  <source src="assets/videos/video.mp4" type="video/mp4" />
</video>
        </div>

        <button class="btn" onclick="nextScreen()">
          Mensaje final 💕
        </button>
      </div>
    </section>

    <!-- PANTALLA 5 -->
    <section class="screen">
      <div class="content final-screen">

  <div class="big-heart">💖</div>

  <h2 class="final-title">
    Feliz Día mi Super Mamá 💖
  </h2>

  <p class="message type-text"
    data-text="Papi y Sofy te amamos infinitamente, eres la mejor mamá del mundo mundial 🌎✨">
  </p>

  <div class="final-glow"></div>

  <button class="btn" onclick="restartExperience()">
    Ver otra vez ✨
  </button>

</div>
    </section>

  </main>

  <button id="musicToggle" class="music-toggle" onclick="toggleMusic()">
    🎵
  </button>
<!-- MODAL FOTO FULLSCREEN -->
<div id="photoModal" class="photo-modal" onclick="closePhotoModal()">
  <button class="close-modal">×</button>
  <img id="modalImage" src="" alt="Foto ampliada" />
</div>
  <script src="script.js"></script>
</body>
</html>
